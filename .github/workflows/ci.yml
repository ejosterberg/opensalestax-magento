name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Magento's coding-standard package (^32.0) does not yet support PHP 8.3.
        # v0.2 will add 8.3 once the toolchain catches up.
        php: ["8.1", "8.2"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer:v2

      - name: Composer cache
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHPUnit
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHPCS (Magento2 standard)
        run: vendor/bin/phpcs --runtime-set installed_paths vendor/magento/magento-coding-standard,vendor/phpcompatibility/php-compatibility,vendor/phpcsstandards/phpcsutils

      - name: Composer audit
        run: composer audit --no-dev || true

      - name: Upload coverage
        if: matrix.php == '8.1'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
