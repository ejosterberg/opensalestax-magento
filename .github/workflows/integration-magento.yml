#
# Mg-1: live-Magento integration test for opensalestax-magento.
#
# Why this workflow exists: the v1.3.0 -> v1.3.4 six-bug chain (May 2026)
# shipped silently broken cart totals because Magento's Interceptor + DI +
# canonical-totals-write behavior is structurally unreachable from unit
# tests. This workflow spins up a real Magento install + a mock OST engine
# and drives `$quote->collectTotals()` end-to-end on an MN fixture, then
# asserts `$shippingAddress->getTaxAmount() > 0`. That single assertion
# would have caught Bugs C + D + E + F at PR time.
#
# Stack choice - Mage-OS over markshust/docker-magento:
#   - Mage-OS publishes a Marketplace-credential-free Magento mirror
#     (https://mirror.mage-os.org/), so this workflow works on fork PRs.
#     markshust pulls from repo.magento.com which needs Adobe Marketplace
#     keys - those can't be exposed to fork PRs, which would defeat the
#     "every PR" goal in `improvement-queue/Mg-1`.
#   - Mage-OS ships `setup-magento` + `setup-install` GitHub Actions that
#     wire up Magento against runner-provided MySQL/ES/RabbitMQ services
#     in ~3-5 min. No docker-compose-in-CI dance.
#   - Magento's own `dev/tests/integration/` PHPUnit harness boots a full
#     ObjectManager - same Interceptor + DI surface that the unit tests
#     cannot reach.
#
# Run time budget: ~12 min per PR (cold Magento install ~5 min;
# module require + di:compile ~2 min; integration test ~30s;
# rest is checkout / setup overhead). Cached composer packages cut
# subsequent runs to ~7 min.

name: integration-magento

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same ref when a new commit lands -
# the integration job is long enough that double-running is wasteful.
concurrency:
  group: integration-magento-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-magento-integration:
    name: Live Magento ${{ matrix.magento }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 25  # hard ceiling - see budget above
    strategy:
      fail-fast: false
      matrix:
        # First-cut matrix: single Magento + PHP combo to keep wall-clock
        # reasonable. Expand to 2.4.5 / 2.4.6 in v1.4.x once the baseline
        # is reliably green - see CHANGELOG entry for v1.3.6.
        include:
          - php: "8.2"
            magento: "2.4.7-p3"

    services:
      # Magento setup:install needs MySQL 8 (2.4.7-p3) + OpenSearch 2.x
      # (replaces Elasticsearch on 2.4.6+). RabbitMQ is optional for our
      # test path (we only exercise quote totals, not async events) but
      # cheap to include and matches what `bin/magento setup:install`
      # expects by default.
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: magento_integration_tests
          MYSQL_USER: magento
          MYSQL_PASSWORD: magento
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      opensearch:
        image: opensearchproject/opensearch:2
        env:
          discovery.type: single-node
          plugins.security.disabled: "true"
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: "OstaxIntegrationTest_1!"
        ports:
          - 9200:9200
        options: >-
          --health-cmd="curl -sf http://localhost:9200/_cluster/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      # Where the mock engine listens. Used by both the workflow's
      # background-process step AND the PHPUnit test
      # (LiveMagentoTaxTest::assertMockEngineReachable).
      OSTAX_TEST_ENGINE_URL: http://127.0.0.1:8080
      # Where Mage-OS setup-magento drops the install.
      MAGENTO_DIR: ${{ github.workspace }}/_magento

    steps:
      - name: Checkout module source
        uses: actions/checkout@v4
        with:
          path: opensalestax-magento

      - name: Set up Node 24 (for the mock OST engine)
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Start mock OST engine in background
        # The mock listens on 127.0.0.1:8080 and writes a one-line
        # JSON log to stderr on every /v1/calculate. We tail it in
        # the test logs if the test fails (see "Dump mock engine
        # log on failure" below).
        run: |
          mkdir -p "${{ runner.temp }}/mock-engine"
          nohup node opensalestax-magento/tests/Integration/mock-engine/server.js \
            > "${{ runner.temp }}/mock-engine/stdout.log" \
            2> "${{ runner.temp }}/mock-engine/stderr.log" &
          echo $! > "${{ runner.temp }}/mock-engine/pid"
          # Wait up to 10s for the listener to come up.
          for i in $(seq 1 20); do
            if curl -sf "${OSTAX_TEST_ENGINE_URL}/v1/health" > /dev/null; then
              echo "mock engine healthy after ${i} poll(s)"
              exit 0
            fi
            sleep 0.5
          done
          echo "mock engine failed to start"
          cat "${{ runner.temp }}/mock-engine/stderr.log" || true
          exit 1

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          # Magento 2.4.7-p3 required extensions per devdocs.
          extensions: bcmath, ctype, curl, dom, fileinfo, gd, hash, iconv, intl, mbstring, openssl, pdo_mysql, simplexml, soap, sockets, sodium, tokenizer, xmlwriter, xsl, zip
          coverage: none
          ini-values: memory_limit=2G

      - name: Cache composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-integration-${{ matrix.php }}-${{ matrix.magento }}-${{ hashFiles('opensalestax-magento/composer.json') }}
          restore-keys: |
            composer-integration-${{ matrix.php }}-${{ matrix.magento }}-
            composer-integration-${{ matrix.php }}-

      - name: Create Magento project from Mage-OS mirror
        # No Adobe Marketplace credentials needed - the Mage-OS mirror
        # is the credential-free path. `setup-magento` would also work
        # but we want explicit control of the install directory.
        #
        # Retry up to 3x: mirror.mage-os.org occasionally returns
        # HTTP 520 (Cloudflare origin error) for stretches of 1-2
        # minutes. The artifacts themselves are stable; this is purely
        # CDN flake. Don't fail the build on transient mirror issues.
        run: |
          for attempt in 1 2 3; do
            if composer create-project \
              --repository-url=https://mirror.mage-os.org/ \
              "magento/project-community-edition=${{ matrix.magento }}" \
              "${MAGENTO_DIR}" \
              --no-install; then
              break
            fi
            echo "create-project failed (attempt ${attempt}); waiting before retry"
            rm -rf "${MAGENTO_DIR}"
            sleep $((attempt * 15))
          done
          test -d "${MAGENTO_DIR}" || { echo "Mage-OS mirror unreachable after 3 retries"; exit 1; }
          # Pre-create app/etc so the magento-composer-installer plugin
          # doesn't choke (same fix the Mage-OS `fix-magento-install`
          # action applies - inlined here for transparency).
          mkdir -p "${MAGENTO_DIR}/app/etc"

      - name: Allow Magento composer plugins
        working-directory: ${{ env.MAGENTO_DIR }}
        run: |
          composer config --no-interaction allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer config --no-interaction allow-plugins.laminas/laminas-dependency-plugin true
          composer config --no-interaction allow-plugins.magento/composer-dependency-version-audit-plugin true
          composer config --no-interaction allow-plugins.magento/composer-root-update-plugin true
          composer config --no-interaction allow-plugins.magento/magento-composer-installer true
          composer config --no-interaction allow-plugins.magento/inventory-composer-installer true

      - name: Register module as a path repository
        working-directory: ${{ env.MAGENTO_DIR }}
        run: |
          composer config repositories.opensalestax-local path "${{ github.workspace }}/opensalestax-magento"
          composer require "ejosterberg/module-opensalestax:@dev" --no-update

      - name: Install Magento dependencies (composer install)
        # Same retry rationale as the create-project step above:
        # the Mage-OS mirror sporadically returns HTTP 520. Composer's
        # own retry-once behavior isn't enough on a sustained outage.
        working-directory: ${{ env.MAGENTO_DIR }}
        run: |
          for attempt in 1 2 3; do
            if composer install --no-interaction --prefer-dist; then
              break
            fi
            echo "composer install failed (attempt ${attempt}); waiting before retry"
            sleep $((attempt * 15))
          done
          # Validate the module is actually installed.
          test -f vendor/ejosterberg/module-opensalestax/EJOsterberg/OpenSalesTax/registration.php \
            || { echo "Module install verification failed"; exit 1; }

      - name: Configure integration test framework
        working-directory: ${{ env.MAGENTO_DIR }}/dev/tests/integration
        # Magento's integration test harness reads install config from
        # etc/install-config-mysql.php. Point it at the runner's
        # service-container MySQL + OpenSearch on 127.0.0.1, and strip
        # AMQP entries - we don't run RabbitMQ as a service (our test
        # path only exercises quote totals, not async events) and
        # Magento 2.4.7-p3's setup:install treats a failed AMQP probe
        # as a hard error rather than skipping it.
        run: |
          cp etc/install-config-mysql.php.dist etc/install-config-mysql.php
          sed -i "s|'db-host' => 'localhost'|'db-host' => '127.0.0.1'|" etc/install-config-mysql.php
          sed -i "s|'db-password' => '123123q'|'db-password' => 'rootpw'|" etc/install-config-mysql.php
          sed -i "s|'elasticsearch-host' => 'localhost'|'elasticsearch-host' => '127.0.0.1'|" etc/install-config-mysql.php
          sed -i "s|'search-engine' => 'elasticsearch7'|'search-engine' => 'opensearch'|" etc/install-config-mysql.php
          sed -i "s|'opensearch-host' => 'localhost'|'opensearch-host' => '127.0.0.1'|" etc/install-config-mysql.php
          # Drop every line that contains an 'amqp-' config key. The
          # remaining commas in the array literal are still valid PHP.
          sed -i "/'amqp-/d" etc/install-config-mysql.php
          # Disable InventoryDistanceBasedSourceSelection (Magento OSS
          # 2.4.7-p3 ships a DI bug where GetGeoCodesForAddress declares
          # ClientInterface but is wired with Curl - DI fails any time
          # the multi-source-inventory checker runs against a quote
          # item with a stock_id set). This module isn't on the path
          # we exercise (single-source default stock), so disabling it
          # is loss-less for the test's coverage of the OST plugin.
          sed -i "s|'disable-modules' => .*|'disable-modules' => 'Magento_InventoryDistanceBasedSourceSelection,Magento_InventoryDistanceBasedSourceSelectionAdminUi,Magento_InventoryDistanceBasedSourceSelectionApi',|" etc/install-config-mysql.php
          # If the .dist didn't have a disable-modules key at all, inject one before the closing bracket.
          grep -q "'disable-modules'" etc/install-config-mysql.php \
            || sed -i "s|^];|    'disable-modules' => 'Magento_InventoryDistanceBasedSourceSelection,Magento_InventoryDistanceBasedSourceSelectionAdminUi,Magento_InventoryDistanceBasedSourceSelectionApi',\n];|" etc/install-config-mysql.php
          echo "=== effective install-config-mysql.php ==="
          cat etc/install-config-mysql.php

      - name: Allow stored function creators in MySQL
        # Magento's integration setup creates triggers; the default
        # binary log policy blocks this. One-shot setting via root.
        run: |
          mysql --host 127.0.0.1 --port 3306 -u root -prootpw \
            -e "SET GLOBAL log_bin_trust_function_creators = 1;"

      - name: Copy LiveMagentoTaxTest into Magento's integration testsuite
        # Magento's integration phpunit.xml.dist defines a "Real Suite"
        # that auto-discovers tests in `testsuite/` AND in
        # `app/code/*/*/Test/Integration`, NOT in `vendor/`. Critically,
        # the SuiteLoader (`Magento\TestFramework\SuiteLoader`) only
        # initializes the per-test ObjectManager when tests are loaded
        # via the testsuite mechanism - invoking PHPUnit on a single
        # file path bypasses the loader and leaves
        # `Bootstrap::getObjectManager()` returning null.
        #
        # We therefore drop the test into `testsuite/EJOsterberg/`
        # (covered by `<directory>testsuite</directory>` in the Real
        # Suite) AND filter by class name when running. This gets us
        # the ObjectManager-initialized lifecycle while skipping the
        # rest of Magento's 10k-test integration corpus.
        run: |
          TEST_DIR="${MAGENTO_DIR}/dev/tests/integration/testsuite/EJOsterberg/OpenSalesTax"
          mkdir -p "${TEST_DIR}"
          cp opensalestax-magento/tests/Integration/LiveMagentoTaxTest.php \
            "${TEST_DIR}/LiveMagentoTaxTest.php"
          # Sanity-check the file is in place and parseable.
          php -l "${TEST_DIR}/LiveMagentoTaxTest.php"

      - name: Run LiveMagentoTaxTest
        working-directory: ${{ env.MAGENTO_DIR }}/dev/tests/integration
        env:
          OSTAX_TEST_ENGINE_URL: ${{ env.OSTAX_TEST_ENGINE_URL }}
        # Run via the "Real Suite" testsuite so Magento's SuiteLoader
        # initializes the ObjectManager. `--filter LiveMagentoTaxTest`
        # narrows the run to our single class.
        run: |
          ../../../vendor/bin/phpunit \
            --configuration phpunit.xml.dist \
            --testsuite "Magento Integration Tests Real Suite" \
            --filter '/^EJOsterberg\\OpenSalesTax\\LiveMagentoTaxTest::/'

      - name: Dump mock engine log on failure
        if: failure()
        run: |
          echo "=== mock engine stderr ==="
          cat "${{ runner.temp }}/mock-engine/stderr.log" || echo "(no stderr log)"
          echo "=== mock engine stdout ==="
          cat "${{ runner.temp }}/mock-engine/stdout.log" || echo "(no stdout log)"

      - name: Stop mock engine
        if: always()
        run: |
          PID_FILE="${{ runner.temp }}/mock-engine/pid"
          if [ -f "$PID_FILE" ]; then
            kill "$(cat "$PID_FILE")" 2>/dev/null || true
          fi
